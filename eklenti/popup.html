<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  body {
    width: 340px; margin: 0; padding: 16px;
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background:
      radial-gradient(120% 90% at 10% 0%, rgba(10, 132, 255, 0.16), transparent 55%),
      radial-gradient(120% 90% at 100% 100%, rgba(191, 90, 242, 0.10), transparent 55%),
      linear-gradient(160deg, #202024, #161619);
    color: #f5f5f7;
  }
  header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 14px; }
  .logo {
    font-size: 21px; font-weight: 800; letter-spacing: 0.5px;
    background: linear-gradient(90deg, #0a84ff, #bf5af2);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .altyazi { color: #98989d; font-size: 11px; flex: 1; }
  .nokta { width: 8px; height: 8px; border-radius: 50%; background: #5a5a5e; align-self: center; }
  .nokta.acik { background: #30d158; box-shadow: 0 0 8px rgba(48, 209, 88, 0.6); }

  .kart {
    background: rgba(255, 255, 255, 0.06);
    border: 0.5px solid rgba(255, 255, 255, 0.09);
    border-radius: 14px; padding: 12px; margin-bottom: 10px;
  }
  #baslik { font-weight: 600; font-size: 13px; word-break: break-word; margin-bottom: 2px; }
  #meta { color: #98989d; font-size: 11.5px; margin-bottom: 10px; }
  .butonlar { display: flex; flex-wrap: wrap; gap: 6px; }
  .butonlar button {
    padding: 6px 13px; border-radius: 999px; border: none;
    background: rgba(255, 255, 255, 0.13); color: #fff;
    font-size: 12.5px; font-weight: 500; font-family: inherit; cursor: pointer;
    transition: background 0.15s ease;
  }
  .butonlar button:hover { background: rgba(255, 255, 255, 0.24); }
  .butonlar button.birincil { background: #0a84ff; }
  .butonlar button.birincil:hover { background: #339dff; }

  #mesaj { color: #98989d; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
  #mesaj.hata { color: #ff6961; }
  #mesaj.tamam { color: #30d158; }

  .bolum-baslik {
    font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
    color: #98989d; text-transform: uppercase; margin: 14px 0 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .temizle-btn {
    border: none; background: none; color: #0a84ff; cursor: pointer;
    font-size: 11px; font-weight: 600; font-family: inherit;
    letter-spacing: 0; text-transform: none; padding: 0;
  }
  .temizle-btn:hover { text-decoration: underline; }
  .temizle-btn:disabled { color: #5a5a5e; cursor: default; text-decoration: none; }
  .is {
    background: rgba(255, 255, 255, 0.06);
    border: 0.5px solid rgba(255, 255, 255, 0.09);
    border-radius: 12px; padding: 10px 12px; margin-bottom: 7px;
  }
  .is-ust { display: flex; align-items: center; gap: 8px; }
  .is-baslik {
    flex: 1; font-size: 12.5px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .is-durum { font-size: 11.5px; color: #98989d; flex: none; }
  .is-durum.tamam { color: #30d158; }
  .is-durum.hata { color: #ff6961; }
  .is-iptal {
    flex: none; width: 20px; height: 20px; border-radius: 50%;
    border: none; background: rgba(255, 255, 255, 0.12); color: #d8d8dc;
    font-size: 11px; line-height: 1; cursor: pointer; padding: 0;
  }
  .is-iptal:hover { background: #ff453a; color: #fff; }
  .is-iptal:disabled { opacity: 0.4; cursor: default; }
  .cubuk {
    margin-top: 7px; height: 4px; border-radius: 2px;
    background: rgba(255, 255, 255, 0.1); overflow: hidden;
  }
  .cubuk > div {
    height: 100%; width: 0%; border-radius: 2px;
    background: linear-gradient(90deg, #0a84ff, #64b5ff);
    transition: width 0.4s ease;
  }
  #isListesi:empty::after {
    content: "Henüz indirme yok";
    display: block; color: #6e6e73; font-size: 12px; text-align: center; padding: 6px 0;
  }
  .donen {
    display: inline-block; width: 13px; height: 13px;
    border: 2px solid rgba(255, 255, 255, 0.2); border-top-color: #0a84ff;
    border-radius: 50%; animation: don 0.8s linear infinite; vertical-align: -2px;
  }
  @keyframes don { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <img src="icon32.png" alt="" style="width:22px;height:22px;border-radius:6px;align-self:center">
    <span class="logo">PKD</span>
    <span class="altyazi">Post Kreatif Downloader</span>
    <span class="nokta" id="sunucuNokta"></span>
  </header>

  <div class="kart" id="videoKart">
    <div id="icerik"><span class="donen"></span> Video aranıyor…</div>
    <div id="baslik" hidden></div>
    <div id="meta" hidden></div>
    <div class="butonlar" id="butonlar"></div>
    <div id="mesaj"></div>
  </div>

  <div class="bolum-baslik">
    <span>İndirmeler</span>
    <button class="temizle-btn" id="temizle">Geçmişi temizle</button>
  </div>
  <div id="isListesi"></div>

  <script src="popup.js"></script>
</body>
</html>
